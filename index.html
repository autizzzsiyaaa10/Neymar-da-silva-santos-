<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neymar Run - O Jogo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background: #009c3b; /* Brazil Green */
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: linear-gradient(to bottom, #74ebd5, #9ecee6); /* Aesthetic sky */
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        /* Stadium/Pitch Background perspective */
        #pitch {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60%;
            background: repeating-linear-gradient(0deg, #00b33c, #00b33c 20px, #009c3b 20px, #009c3b 40px);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }
        /* UI Elements */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            text-shadow: 2px 2px #000;
            font-size: 20px;
            z-index: 10;
        }
        #score-box, #gold-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #ffdf00; /* Brazil Yellow */
        }
        /* Neymar Player */
        #player {
            position: absolute;
            bottom: 40px;
            width: 60px;
            height: 90px;
            background: #ffdf00; /* Placeholder: Yellow Jersey */
            border-radius: 10px;
            transition: left 0.15s ease-out;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #002244;
            box-shadow: 0 10px 10px rgba(0,0,0,0.3);
            border: 3px solid #0052b4;
        }
        #player::after {
            content: 'NJR 10';
            font-size: 14px;
        }
        /* Obstacles & Collectibles */
        .obstacle {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #ff3333; 
            border-radius: 5px;
            z-index: 4;
        }
        .coin {
            position: absolute;
            width: 35px;
            height: 35px;
            background: #ffdf00;
            border-radius: 50%;
            border: 3px dashed #fff;
            z-index: 4;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        /* Screen Overlays */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            text-align: center;
            padding: 20px;
        }
        .screen h1 {
            color: #ffdf00;
            font-size: 40px;
            margin-bottom: 10px;
            text-shadow: 3px 3px #0052b4;
        }
        .btn {
            background: #009c3b;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px #005b22;
            font-family: inherit;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px #005b22;
        }
        /* Mobile Controls Overlay */
        #controls-hint {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div id="score-box">SCORE: <span id="score">0</span></div>
        <div id="gold-box">⚽: <span id="coins">0</span></div>
    </div>
    
    <div id="pitch"></div>
    <div id="player"></div>
    <div id="controls-hint">Swipe or Use Left/Right Arrow Keys</div>

    <div id="start-screen" class="screen">
        <h1>NEYMAR RUN</h1>
        <p>Dribble past obstacles and collect golden soccer balls!</p>
        <button class="btn" onclick="startGame()">JOGAR (PLAY)</button>
    </div>

    <div id="gameover-screen" class="screen" style="display: none;">
        <h1>Ousadia e Alegria!</h1>
        <p>You tripped!</p>
        <p style="margin-top: 10px;">Final Score: <span id="final-score">0</span></p>
        <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const scoreEl = document.getElementById('score');
    const coinsEl = document.getElementById('coins');
    const startScreen = document.getElementById('start-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const finalScoreEl = document.getElementById('final-score');

    // Direct streaming link to Parado no Bailão
    const bgMusic = new Audio('https://archive.org/download/parado-no-bailao-m-c-val-m-c-ld/Parado%20No%20Bail%C3%A3o%20-%20MC%20Val%20%26%20MC%20LD.mp3'); 
    bgMusic.loop = true;
    bgMusic.volume = 0.5;

    // Lanes system
    const lanes = [15, 50, 85]; 
    let currentLane = 1; 
    
    let gameActive = false;
    let score = 0;
    let coins = 0;
    let gameSpeed = 5;
    let spawnTimer = 0;
    let entities = [];

    function updatePlayerPosition() {
        player.style.left = `calc(${lanes[currentLane]}% - 30px)`;
    }
    updatePlayerPosition();

    // Controls
    window.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if (e.key === 'ArrowLeft' && currentLane > 0) {
            currentLane--;
        } else if (e.key === 'ArrowRight' && currentLane < 2) {
            currentLane++;
        }
        updatePlayerPosition();
    });

    // Mobile Swipe Controls
    let touchStartX = 0;
    container.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX, {passive: true});
    container.addEventListener('touchend', e => {
        if (!gameActive) return;
        let diffX = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(diffX) > 40) {
            if (diffX > 0 && currentLane < 2) currentLane++;
            else if (diffX < 0 && currentLane > 0) currentLane--;
            updatePlayerPosition();
        }
    }, {passive: true});

    function startGame() {
        // Music plays immediately on start
        bgMusic.play().catch(error => console.log("Audio waiting for user click interaction:", error));

        // Reset variables
        score = 0;
        coins = 0;
        gameSpeed = 6;
        entities.forEach(ent => ent.el.remove());
        entities = [];
        currentLane = 1;
        updatePlayerPosition();
        
        scoreEl.innerText = score;
        coinsEl.innerText = coins;
        
        startScreen.style.display = 'none';
        gameoverScreen.style.display = 'none';
        gameActive = true;
    }

    function gameOver() {
        gameActive = false;
        bgMusic.pause(); 
        bgMusic.currentTime = 0; 
        finalScoreEl.innerText = score;
        gameoverScreen.style.display = 'flex';
    }

    // Game Loop
    function update() {
        if (gameActive) {
            score++;
            scoreEl.innerText = score;
            if (score % 500 === 0) gameSpeed += 0.5;

            // Spawn elements
            spawnTimer++;
            if (spawnTimer > 40) {
                spawnTimer = 0;
                let randomLane = Math.floor(Math.random() * 3);
                let isCoin = Math.random() > 0.4;
                
                let el = document.createElement('div');
                el.className = isCoin ? 'coin' : 'obstacle';
                
                if (!isCoin) {
                    el.style.background = Math.random() > 0.5 ? '#ffcc00' : '#ff3333'; 
                    el.innerText = '🟥';
                    el.style.display = 'flex';
                    el.style.justifyContent = 'center';
                    el.style.alignItems = 'center';
                } else {
                    el.innerText = '⚽';
                    el.style.display = 'flex';
                    el.style.justifyContent = 'center';
                    el.style.alignItems = 'center';
                    el.style.fontSize = '20px';
                }

                el.style.left = `calc(${lanes[randomLane]}% - 20px)`;
                el.style.top = '-50px';
                container.appendChild(el);
                
                entities.push({
                    el: el,
                    lane: randomLane,
                    top: -50,
                    type: isCoin ? 'coin' : 'obstacle'
                });
            }

            // Move entities
            for (let i = entities.length - 1; i >= 0; i--) {
                let ent = entities[i];
                ent.top += gameSpeed;
                ent.el.style.top = ent.top + 'px';

                let containerHeight = container.clientHeight;
                if (ent.top > containerHeight - 140 && ent.top < containerHeight - 40 && ent.lane === currentLane) {
                    if (ent.type === 'obstacle') {
                        gameOver();
                        return;
                    } else if (ent.type === 'coin') {
                        coins++;
                        coinsEl.innerText = coins;
                        ent.el.remove();
                        entities.splice(i, 1);
                        continue;
                    }
                }

                if (ent.top > containerHeight) {
                    ent.el.remove();
                    entities.splice(i, 1);
                }
            }
        }
        requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
</script>
</body>
</html>
