<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neymar Joga Bonito Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #111;
            font-family: 'Arial', sans-serif;
            color: white;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #11998e, #38ef7d);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #startScreen {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #fbc531;
            box-shadow: 0 0 25px rgba(251, 197, 49, 0.6);
        }
        h1 {
            color: #fbc531;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
        }
        .btn {
            background: #fbc531;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #fff;
        }
        #gameCanvas {
            display: none;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 2px 2px black;
            color: #fbc531;
            z-index: 5;
            display: none;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="startScreen">
            <h1>Neymar Joga Bonito</h1>
            <p style="color: #00df89; font-weight: bold; margin-bottom: 10px;">🎶 MUSIC VERSION 🎶</p>
            <p>Help Neymar run, jump, and dodge soccer balls!</p>
            <p style="font-size: 0.9rem; color: #ccc; margin-top: 5px;">Tap Screen or Spacebar to JUMP</p>
            <button class="btn" id="startButton">JOGAR (PLAY)</button>
        </div>

        <div id="ui">SCORE: <span id="scoreVal">0</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <audio id="bgMusic" loop preload="auto" crossorigin="anonymous">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        const ui = document.getElementById('ui');
        const scoreVal = document.getElementById('scoreVal');
        const bgMusic = document.getElementById('bgMusic');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let isPlaying = false;
        let score = 0;
        let obstacles = [];
        let gameFrame = 0;
        let obstacleSpeed = 7;

        const neymar = {
            x: 80,
            y: 0,
            width: 90,
            height: 120,
            vy: 0,
            weight: 1.3,
            groundY: 0,
            isJumping: false,
            image: new Image()
        };
        // Transparent fallback neymar image
        neymar.image.crossOrigin = "anonymous";
        neymar.image.src = 'https://i.imgur.com/vHqY7bE.png'; 

        class Obstacle {
            constructor() {
                this.x = canvas.width;
                this.y = neymar.groundY + neymar.height - 40; 
                this.size = 45;
                this.image = new Image();
                this.image.crossOrigin = "anonymous";
                this.image.src = 'https://i.imgur.com/XF9xJ8K.png'; 
            }
            draw() {
                if (this.image.complete && this.image.naturalWidth !== 0) {
                    ctx.drawImage(this.image, this.x, this.y, this.size, this.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x + this.size/2, this.y + this.size/2, this.size/2, 0, Math.PI * 2);
                    ctx.fillStyle = "#ffffff";
                    ctx.fill();
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = "#000000";
                    ctx.stroke();
                    ctx.fillStyle = "#000000";
                    ctx.font = "22px Arial";
                    ctx.fillText("⚽", this.x + 8, this.y + 30);
                }
            }
            update() {
                this.x -= obstacleSpeed;
                this.draw();
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            ui.style.display = 'block';
            isPlaying = true;
            score = 0;
            scoreVal.innerText = score;
            obstacles = [];
            obstacleSpeed = 7;
            
            neymar.groundY = canvas.height - 180;
            neymar.y = neymar.groundY;

            // Try to play music immediately
            bgMusic.currentTime = 0;
            bgMusic.volume = 0.8;
            bgMusic.play().catch(e => console.log("Music waiting for interaction..."));

            animate();
        }

        function jump() {
            if (!neymar.isJumping) {
                neymar.vy = -24;
                neymar.isJumping = true;
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') jump();
        });
        window.addEventListener('touchstart', jump);
        window.addEventListener('mousedown', jump);

        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.size - 10 &&
                rect1.x + rect1.width > rect2.x + 10 &&
                rect1.y < rect2.y + rect2.size - 10 &&
                rect1.y + rect1.height > rect2.y + 10
            );
        }

        function gameOver() {
            isPlaying = false;
            bgMusic.pause();
            alert("GAME OVER! Score: " + score);
            startScreen.style.display = 'block';
            canvas.style.display = 'none';
            ui.style.display = 'none';
        }

        function drawNeymarFallback(x, y, w, h) {
            ctx.fillStyle = "#000000"; 
            ctx.fillRect(x + 25, y - 10, w - 50, 20);
            ctx.fillStyle = "#e0ac69"; 
            ctx.fillRect(x + 20, y + 10, w - 40, 30);
            ctx.fillStyle = "#fbc531"; 
            ctx.fillRect(x + 10, y + 40, w - 20, 50);
            ctx.fillStyle = "#008000";
