<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neymar Joga Bonito Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #111;
            font-family: 'Arial', sans-serif;
            color: white;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #11998e, #38ef7d);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #startScreen {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #fbc531;
            box-shadow: 0 0 25px rgba(251, 197, 49, 0.6);
        }
        h1 {
            color: #fbc531;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
        }
        .btn {
            background: #fbc531;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #fff;
        }
        #gameCanvas {
            display: none;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 2px 2px black;
            color: #fbc531;
            z-index: 5;
            display: none;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="startScreen">
            <h1>Neymar Joga Bonito</h1>
            <p style="color: #00df89; font-weight: bold; margin-bottom: 10px;">⚡ 100% CRASH-PROOF VERSION ⚡</p>
            <p>Help Neymar run, jump, and dodge soccer balls!</p>
            <p style="font-size: 0.9rem; color: #ccc; margin-top: 5px;">Tap Screen or Spacebar to JUMP</p>
            <button class="btn" id="startButton">JOGAR (PLAY)</button>
        </div>

        <div id="ui">SCORE: <span id="scoreVal">0</span></div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        const ui = document.getElementById('ui');
        const scoreVal = document.getElementById('scoreVal');
        const bgMusic = document.getElementById('bgMusic');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let isPlaying = false;
        let score = 0;
        let obstacles = [];
        let gameFrame = 0;
        let obstacleSpeed = 7;

        // Neymar Character Setup
        const neymar = {
            x: 80,
            y: 0,
            width: 70,
            height: 100,
            vy: 0,
            weight: 1.3,
            groundY: 0,
            isJumping: false,
            image: new Image()
        };
        // Neymar Brazil Jersey avatar (with cross-origin enabled)
        neymar.image.crossOrigin = "anonymous";
        neymar.image.src = 'https://i.imgur.com/vHqY7bE.png'; 

        // Obstacle (Soccer Ball)
        class Obstacle {
            constructor() {
                this.x = canvas.width;
                this.y = neymar.groundY + neymar.height - 40; 
                this.size = 40;
                this.image = new Image();
                this.image.crossOrigin = "anonymous";
                this.image.src = 'https://i.imgur.com/XF9xJ8K.png'; 
            }
            draw() {
                if (this.image.complete && this.image.naturalWidth !== 0) {
                    ctx.drawImage(this.image, this.x, this.y, this.size, this.size);
                } else {
                    // Fallback Soccer Ball Design (White circle with black spots)
                    ctx.beginPath();
                    ctx.arc(this.x + this.size/2, this.y + this.size/2, this.size/2, 0, Math.PI * 2);
                    ctx.fillStyle = "#ffffff";
                    ctx.fill();
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = "#000000";
                    ctx.stroke();
                    // Draw a quick star/cross inside for soccer feel
                    ctx.fillStyle = "#000000";
                    ctx.font = "20px Arial";
                    ctx.fillText("⚽", this.x + 8, this.y + 28);
                }
            }
            update() {
                this.x -= obstacleSpeed;
                this.draw();
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            ui.style.display = 'block';
            isPlaying = true;
            score = 0;
            scoreVal.innerText = score;
            obstacles = [];
            obstacleSpeed = 7;
            
            neymar.groundY = canvas.height - 180;
            neymar.y = neymar.groundY;

            // Safe music play
            bgMusic.currentTime = 0;
            bgMusic.volume = 0.8;
            bgMusic.play().catch(e => console.log("Audio waiting for user swipe"));

            animate();
        }

        function jump() {
            if (!neymar.isJumping) {
                neymar.vy = -24;
                neymar.isJumping = true;
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') jump();
        });
        window.addEventListener('touchstart', jump);
        window.addEventListener('mousedown', jump);

        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.size - 8 &&
                rect1.x + rect1.width > rect2.x + 8 &&
                rect1.y < rect2.y + rect2.size - 8 &&
                rect1.y + rect1.height > rect2.y + 8
            );
        }

        function gameOver() {
            isPlaying = false;
            bgMusic.pause();
            alert("GAME OVER! Score: " + score);
            startScreen.style.display = 'block';
            canvas.style.display = 'none';
            ui.style.display = 'none';
        }

        // Draw Beautiful Neymar Vector if Image fails
        function drawNeymarFallback(x, y, w, h) {
            // Hair (Black)
            ctx.fillStyle = "#000000";
            ctx.fillRect(x + 20, y - 5, w - 40, 15);
            // Face/Skin (Brown/Tan)
            ctx.fillStyle = "#e0ac69";
            ctx.fillRect(x + 15, y + 10, w - 30, 25);
            // Brazil Jersey (Yellow)
            ctx.fillStyle = "#fbc531";
            ctx.fillRect(x + 5, y + 35, w - 10, 45);
            // Jersey Number "10" (Green)
            ctx.fillStyle = "#008000";
            ctx.font = "bold 20px Arial";
            ctx.fillText("10", x + 23, y + 65);
            // Shorts (Blue)
            ctx.fillStyle = "#0000ff";
            ctx.fillRect(x + 5, y + 80, w - 10, 20);
        }

        function animate() {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sky Background
            let skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#1e3c72');
            skyGradient.addColorStop(1, '#2a5298');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Soccer Pitch Floor (Green)
            ctx.fillStyle = "#20bf6b";
            ctx.fillRect(0, neymar.groundY + neymar.height, canvas.width, 300);

            // Pitch White Line
            ctx.fillStyle = "rgba(255,255,255,0.6)";
            ctx.fillRect(0, neymar.groundY + neymar.height + 15, canvas.width, 10);

            // Neymar Physics
            neymar.y += neymar.vy;
            if (neymar.y < neymar.groundY) {
                neymar.vy += neymar.weight;
            } else {
                neymar.y = neymar.groundY;
                neymar.vy = 0;
                neymar.isJumping = false;
            }

            // Draw Neymar (Smooth load check)
            if (neymar.image.complete && neymar.image.naturalWidth !== 0) {
                ctx.drawImage(neymar.image, neymar.x, neymar.y, neymar.width, neymar.height);
            } else {
                // If the internet blocks Imgur, draw Brazil Jersey Neymar directly!
                drawNeymarFallback(neymar.x, neymar.y, neymar.width, neymar.height);
            }

            // Obstacle Spawning
            if (gameFrame % 110 === 0) {
                obstacles.push(new Obstacle());
            }

            // Update obstacles
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].update();

                if (checkCollision(neymar, obstacles[i])) {
                    gameOver();
                    return;
                }

                if (obstacles[i].x + obstacles[i].size < 0) {
                    score++;
                    scoreVal.innerText = score;
                    obstacles.splice(i, 1);
                    i--;
                    
                    if (score % 5 === 0) {
                        obstacleSpeed += 1.2;
                    }
                }
            }

            gameFrame++;
            requestAnimationFrame(animate);
        }

        startButton.addEventListener('click', startGame);
    </script>
</body>
</html>
