<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neymar Joga Bonito Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #111;
            font-family: 'Arial', sans-serif;
            color: white;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #11998e, #38ef7d);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #startScreen {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #fbc531;
            box-shadow: 0 0 25px rgba(251, 197, 49, 0.6);
        }
        h1 {
            color: #fbc531;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
        }
        p {
            font-size: 1.1rem;
            margin: 5px 0;
        }
        .btn {
            background: #fbc531;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn:hover {
            transform: scale(1.1);
            background: #fff;
        }
        #gameCanvas {
            display: none;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 2px 2px black;
            color: #fbc531;
            z-index: 5;
            display: none;
        }
    </style>
</head>
