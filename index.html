            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neymar Joga Bonito Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #111;
            font-family: 'Arial', sans-serif;
            color: white;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #startScreen {
            position: absolute;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #00df89;
            box-shadow: 0 0 20px rgba(0, 223, 137, 0.5);
        }
        h1 {
            color: #00df89;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
        }
        .btn {
            background: #00df89;
            color: black;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 15px;
        }
        .btn:hover {
            transform: scale(1.1);
            background: #fff;
        }
        #gameCanvas {
            display: none;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 2px 2px black;
            z-index: 5;
            display: none;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="startScreen">
            <h1>Neymar Joga Bonito Run</h1>
            <p>Help Neymar run, jump, and score points!</p>
            <p style="margin-top: 10px; font-size: 0.9rem; color: #ccc;">Controls: Tap Screen to Jump</p>
            <button class="btn" id="startButton">JOGAR (PLAY)</button>
        </div>

        <div id="ui">SCORE: <span id="scoreVal">0</span></div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        const ui = document.getElementById('ui');
        const scoreVal = document.getElementById('scoreVal');
        const bgMusic = document.getElementById('bgMusic');

        // Set full screen canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let isPlaying = false;
        let score = 0;
        let obstacles = [];
        let gameFrame = 0;
        let obstacleSpeed = 6;

        // Neymar Character Object
        const neymar = {
            x: 100,
            y: 0,
            width: 80,
            height: 110,
            vy: 0,
            weight: 1.2,
            groundY: 0,
            isJumping: false,
            // Neymar Jr. Cartoon Sprite/Pic
            image: new Image()
        };
        neymar.image.src = 'https://i.imgur.com/zWp72B8.png'; // Transparent Neymar Running Sprite

        // Obstacle (Soccer Ball)
        class Obstacle {
            constructor() {
                this.x = canvas.width;
                this.y = neymar.groundY + neymar.height - 50; // Align with ground
                this.size = 50;
                this.image = new Image();
                this.image.src = 'https://i.imgur.com/XF9xJ8K.png'; // Soccer ball image
            }
            draw() {
                ctx.drawImage(this.image, this.x, this.y, this.size, this.size);
            }
            update() {
                this.x -= obstacleSpeed;
                this.draw();
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            ui.style.display = 'block';
            isPlaying = true;
            score = 0;
            obstacles = [];
            obstacleSpeed = 6;
            
            // Set Player Initial Position based on screen height
            neymar.groundY = canvas.height - 180;
            neymar.y = neymar.groundY;

            // Start Audio
            bgMusic.currentTime = 0;
            bgMusic.play().catch(e => console.log("Audio play needs interaction"));

            animate();
        }

        // Jump Controls
        function jump() {
            if (!neymar.isJumping) {
                neymar.vy = -22;
                neymar.isJumping = true;
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') jump();
        });
        window.addEventListener('touchstart', jump);
        window.addEventListener('mousedown', jump);

        // Check Collisions
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.size &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.size &&
                rect1.y + rect1.height > rect2.y
            );
        }

        // Game Over function
        function gameOver() {
            isPlaying = false;
            bgMusic.pause();
            alert("GAME OVER! Your Score: " + score);
            startScreen.style.display = 'block';
            canvas.style.display = 'none';
            ui.style.display = 'none';
        }

        // Main Animation loop
        function animate() {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground Line
            ctx.fillStyle = "#00df89";
            ctx.fillRect(0, neymar.groundY + neymar.height, canvas.width, 200);

            // Neymar Physics
            neymar.y += neymar.vy;
            if (neymar.y < neymar.groundY) {
                neymar.vy += neymar.weight;
            } else {
                neymar.y = neymar.groundY;
                neymar.vy = 0;
                neymar.isJumping = false;
            }

            // Draw Neymar
            ctx.drawImage(neymar.image, neymar.x, neymar.y, neymar.width, neymar.height);

            // Spawn Obstacles
            if (gameFrame % 100 === 0) {
                obstacles.push(new Obstacle());
            }

            // Update Obstacles
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].update();

                // Check collision
                if (checkCollision(neymar, obstacles[i])) {
                    gameOver();
                    return;
                }

                // Increase score & remove old obstacles
                if (obstacles[i].x + obstacles[i].size < 0) {
                    score++;
                    scoreVal.innerText = score;
                    obstacles.splice(i, 1);
                    i--;
                    
                    // Speed up game slowly
                    if (score % 5 === 0) {
                        obstacleSpeed += 1;
                    }
                }
            }

            gameFrame++;
            requestAnimationFrame(animate);
        }

        startButton.addEventListener('click', startGame);
    </script>
</body>
</html>
